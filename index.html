<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring - Torque Door1 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ff6b6b;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background-color: #51cf66;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(81, 207, 102, 0.5); }
            50% { opacity: 0.7; box-shadow: 0 0 10px rgba(81, 207, 102, 0.3); }
        }

        #stat {
            font-size: 1.1em;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .torque-display {
            text-align: center;
            margin: 40px 0;
        }

        .torque-value {
            font-size: 5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        .torque-label {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-box-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-box-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .torque-value {
                font-size: 3.5em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Mr Strong</h1>
                <p>Torque Monitoring System</p>
            </div>

            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="stat">Waiting for the Python bridge...</span>
            </div>

            <div class="torque-display">
                <div class="torque-value" id="torque">0.00</div>
                <div class="torque-label">Nm</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-box-label">Connection</div>
                    <div class="stat-box-value" id="connectionStatus">Waiting</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Last Update</div>
                    <div class="stat-box-value" id="lastUpdate">--:--:--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Position</div>
                    <div class="stat-box-value" id="velocityValue">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Driver</div>
                    <div class="stat-box-value" id="stateValue">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Torque SP</div>
                    <div class="stat-box-value" id="spValue">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Torque Error</div>
                    <div class="stat-box-value" id="torqueErrorStatus">Off</div>
                </div>
            </div>

            <div class="footer">
                <p>Door 1 - Real-time Torque Monitoring</p>
                <button id="downloadBtn" style="margin-top:20px;padding:10px 20px;background:#667eea;color:white;border:none;border-radius:6px;cursor:pointer;font-size:1em;">Download CSV</button>
            </div>
        </div>
    </div>

    <div style="width:100%;max-width:600px;margin:20px auto;text-align:center;color:#ddd;">
        <div style="background:rgba(0,0,0,0.4);border-radius:8px;padding:15px;border:1px solid rgba(255,255,255,0.06);">
            <div style="font-size:0.9em;color:rgba(255,255,255,0.7);margin-bottom:10px;text-align:left;">Data Log (last 20 entries)</div>
            <div id="logContainer" style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;"></div>
        </div>
    </div>

    <script>
    // --- INITIALISATION DES VARIABLES ---
    let lastErrorState = false; 
    let dataLog = []; // Tableau pour stocker les erreurs
    const MAX_ENTRIES = 100;

    // --- MISE À JOUR DE L'HEURE ---
    function updateTime() {
        const now = new Date();
        const timeEl = document.getElementById('lastUpdate');
        if (timeEl) timeEl.textContent = now.toLocaleTimeString('fr-FR', { hour12: false });
    }

    // --- FONCTION D'AJOUT AU LOG (Appelée lors d'une erreur) ---
    function addLogEntry(torque, pos, state, sp, errorMsg) {
        const now = new Date();
        const timestamp = now.toLocaleTimeString('fr-FR', { hour12: false });
        
        // Ajouter au début du tableau
        dataLog.unshift({ timestamp, torque, pos, state, sp, error: errorMsg });
        
        // Limiter la taille
        if (dataLog.length > MAX_ENTRIES) dataLog.pop();
        
        // Mettre à jour l'affichage visuel du log
        updateLogDisplay();
    }

    function updateLogDisplay() {
        const container = document.getElementById('logContainer');
        if (!container) return;
        container.innerHTML = '';
        dataLog.forEach(entry => {
            const div = document.createElement('div');
            div.style.cssText = 'background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:8px; margin-bottom:5px; color:#cfe8ff; font-size:0.85em;';
            div.innerHTML = `<strong>${entry.timestamp}</strong> - Tq: ${entry.torque} | Pos: ${entry.pos} | SP: ${entry.sp} | ${entry.error}`;
            container.appendChild(div);
        });
    }

    // --- FONCTION DOWNLOAD CSV ---
    function downloadCSV() {
        if (dataLog.length === 0) {
            alert("Aucune erreur enregistrée pour le moment.");
            return;
        }
        let csv = '\uFEFFTimestamp,Torque,Position,State,Setpoint,Message\r\n';
        dataLog.forEach(e => {
            csv += `${e.timestamp},${e.torque},${e.pos},${e.state},${e.sp},${e.error}\r\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `error_log_${new Date().getTime()}.csv`;
        a.click();
    }

    // --- CONNEXION WEBSOCKET ---
    const ws = new WebSocket('ws://127.0.0.1:1884');

    ws.onmessage = (event) => {
        try {
            // Nettoyage JSON
            let payload = String(event.data).replace(/\x00/g, '').replace(/\bTRUE\b/gi, 'true').replace(/\bFALSE\b/gi, 'false').trim();
            const data = JSON.parse(payload);

            // 1. Mise à jour Affichage temps réel
            if (document.getElementById('torqueValue')) document.getElementById('torqueValue').textContent = Number(data.Torque).toFixed(2);
            if (document.getElementById('velocityValue')) document.getElementById('velocityValue').textContent = Number(data.Position).toFixed(4);
            if (document.getElementById('spValue')) document.getElementById('spValue').textContent = Number(data.Torque_SP).toFixed(2);
            
            const isEnabled = (data.State === true || data.State === 'true' || data.State === 1);
            if (document.getElementById('stateValue')) document.getElementById('stateValue').textContent = isEnabled ? 'Enabled' : 'Disabled';

            // 2. Détection d'Erreur (FRONT MONTANT)
            const currentError = (data.Torque_Err === true || data.Torque_Err === 'true' || data.Torque_Err === 1);
            
            const errStatusEl = document.getElementById('torqueErrorStatus');
            if (errStatusEl) {
                errStatusEl.textContent = currentError ? 'On' : 'Off';
                errStatusEl.style.color = currentError ? '#ff4d4d' : '#4dff88';
            }

            // LOGIQUE : Si l'erreur passe de FALSE à TRUE
            if (currentError && !lastErrorState) {
                addLogEntry(data.Torque, data.Position, isEnabled ? 'ON' : 'OFF', data.Torque_SP, "TORQUE_ERROR_DETECTED");
            }

            lastErrorState = currentError; // Mémorisation

        } catch (e) {
            console.error("Erreur de traitement:", e);
        }
        updateTime();
    };

    // Liaison du bouton de téléchargement
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('downloadBtn');
        if (btn) btn.onclick = downloadCSV;
    });
</script>

</body>
</html>
